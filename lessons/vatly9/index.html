function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function highlight(text){
  if(!text) return '';
  const keys = Object.keys(TERMS).sort((a,b)=>b.length-a.length);
  const placeholders = [];
  const parts = String(text).split(/(<[^>]*>)/g);
  const processed = parts.map((part, idx) => {
    if(idx % 2 === 1) return part;
    let out = part;
    keys.forEach(k=>{
      const re = new RegExp(escRe(k),'gi');
      out = out.replace(re, m=>{
        const id = 'XPH'+placeholders.length+'XPH';
        placeholders.push({id:id, html:'<span class="tip" data-en="'+TERMS[k]+'">'+m+'</span>'});
        return id;
      });
    });
    return out;
  });
  let final = processed.join('');
  placeholders.forEach(p=>{ final = final.split(p.id).join(p.html); });
  return final;
}

let currentSpeakBtn = null;
function stripHtml(html){
  const div = document.createElement('div'); div.innerHTML = html;
  return (div.textContent || div.innerText || '').replace(/\s+/g,' ').trim();
}
function speak(btn, text){
  if(!('speechSynthesis' in window)){ alert('Trình duyệt không hỗ trợ đọc tiếng Việt.'); return; }
  if(window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();
    if(currentSpeakBtn){ currentSpeakBtn.classList.remove('playing'); currentSpeakBtn.textContent='🔊'; }
    if(currentSpeakBtn === btn){ currentSpeakBtn = null; return; }
  }
  const plain = stripHtml(text);
  if(!plain) return;
  const u = new SpeechSynthesisUtterance(plain);
  u.lang = 'vi-VN'; u.rate = 0.92;
  u.onend = ()=>{ btn.classList.remove('playing'); btn.textContent='🔊'; if(currentSpeakBtn===btn) currentSpeakBtn=null; };
  u.onerror = u.onend;
  btn.classList.add('playing'); btn.textContent='⏸';
  currentSpeakBtn = btn;
  window.speechSynthesis.speak(u);
}

function norm(s){
  if(s === undefined || s === null) return '';
  return String(s).toLowerCase().replace(/\s+/g,'').replace(/[\-−–—]/g,'-').replace(/,/g,'.').trim();
}
function validateAttempt(attempt, userInput){
  if(attempt.type === 'choice'){
    if(parseInt(userInput) === attempt.correct) return { ok:true };
    if(attempt.errorMsg) return { ok:false, msg:attempt.errorMsg };
    return { ok:false };
  }
  if(attempt.type === 'yesno'){
    if(userInput === attempt.correct) return { ok:true };
    if(attempt.errorMsg) return { ok:false, msg:attempt.errorMsg };
    return { ok:false };
  }
  const u = norm(userInput);
  if(!u) return { ok:false, msg:'Em hãy nhập câu trả lời trước nhé.' };
  if(attempt.validate) return attempt.validate(userInput, u);
  for(const a of (attempt.answers||[])){ if(norm(a) === u) return { ok:true }; }
  return { ok:false };
}

let state = loadState();
let view = { type:'hub' };
let lessonView = { tab:'theory', step:-1, attempt:null, practiceIdx:0, practiceCorrect:0, quizIdx:0, quizAnswers:[], gameState:null };
let replayTimer = null;

function loadState(){
  try { const s = localStorage.getItem('vatly9-progress'); if(s) return JSON.parse(s); } catch(e){}
  return { progress:{} };
}
function saveState(){ try { localStorage.setItem('vatly9-progress', JSON.stringify(state)); } catch(e){} }
function getProgress(chId,lId){ return state.progress[chId+'-'+lId] || { theorySteps:0, practice:0, game:0, quiz:0 }; }
function setProgress(chId,lId,upd){
  const k = chId+'-'+lId;
  state.progress[k] = Object.assign({}, getProgress(chId,lId), upd);
  saveState();
  try { let act = JSON.parse(localStorage.getItem('toan9-activity') || '[]');
    const today = new Date().toISOString().slice(0,10);
    if(!act.includes(today)){ act.push(today); act = act.sort().slice(-365); localStorage.setItem('toan9-activity', JSON.stringify(act)); }
  } catch(e){}
}
function isLessonDone(chId,lId){
  const p = getProgress(chId,lId);
  const lc = LESSON_CONTENT[chId+'-'+lId];
  if(!lc) return false;
  return p.theorySteps >= lc.steps.length && p.practice >= 80 && p.quiz >= 80;
}
function isLessonUnlocked(chId,lId){
  // Free navigation: any built lesson clickable at any time.
  // (Within-lesson mastery model still gates step→step inside a lesson.)
  return true;
}
function isLessonBuilt(chId,lId){
  const ch = CURRICULUM.find(c=>c.id===chId);
  if(!ch) return false;
  const l = ch.lessons.find(x=>x.id===lId);
  return !!(l && l.built);
}

function calcOverall(){
  let t=0,c=0;
  CURRICULUM.forEach(ch=>ch.lessons.forEach(l=>{ if(l.built){ c++; if(isLessonDone(ch.id,l.id)) t++; } }));
  return c>0 ? Math.round(t/c*100) : 0;
}
function getCurrentAttempt(item){
  if(item.attempts && Array.isArray(item.attempts)){
    if(!lessonView.attempt) lessonView.attempt = { tries:0, passed:false, state:'idle', lastInput:'', revealed:false, history:[], currentVar:0, streak:0 };
    if(typeof lessonView.attempt.currentVar !== 'number') lessonView.attempt.currentVar = 0;
    return item.attempts[lessonView.attempt.currentVar % item.attempts.length];
  }
  return item.attempt;
}
function getMasteryTotal(item){ return item.attempts ? item.attempts.length : 1; }
function getMasteryRequired(){ return 3; }

function getCurrentDpItem(){
  const lc = LESSON_CONTENT[view.chId+'-'+view.lId];
  if(lessonView.tab === 'theory') return lc.steps[lessonView.step];
  if(lessonView.tab === 'practice') return lc.practice[lessonView.practiceIdx];
  return null;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderHeader() + renderMain();
  attachEvents();
  attachTooltipTaps();
}
function renderHeader(){
  const o = calcOverall();
  return '<div class="header"><h1>⚡ Vật lý 9 — Hành trình chinh phục</h1><div class="sub">Sách Kết nối tri thức · Khoa học tự nhiên 9 (phần Vật lý)</div><div class="greet">Chào Mika! ⚡</div><div class="lang-tip">💡 <strong>Hint:</strong> Tap any underlined Vietnamese word for English. Physics formulas use Vietnamese conventions: W<sub>đ</sub> = động năng (kinetic), W<sub>t</sub> = thế năng (potential).</div><div class="pbar"><div class="pbar-fill" style="width:'+o+'%"></div></div><div class="ptext">Tổng tiến độ: '+o+'% hoàn thành</div></div>';
}
function renderMain(){
  if(view.type==='hub') return renderHub();
  if(view.type==='chapter') return renderChapter(view.chId);
  if(view.type==='lesson') return renderLesson(view.chId, view.lId);
  return '';
}
function renderHub(){
  let h = '<div class="crumb"><span>Trang chủ</span></div>';
  CURRICULUM.forEach(ch=>{
    const built = ch.lessons.filter(l=>l.built).length;
    const done = ch.lessons.filter(l=>isLessonDone(ch.id,l.id)).length;
    const tot = built > 0 ? built : ch.lessons.length;
    const pct = tot>0 ? Math.round(done/tot*100) : 0;
    const u = isLessonUnlocked(ch.id, ch.lessons[0].id);
    h += '<div class="card '+(u?'click':'locked')+' '+(pct===100&&built>0?'done':'')+'" data-act="open-ch" data-ch="'+ch.id+'"><div class="tag">'+ch.num+''+'</div><div class="title">'+highlight(ch.title)+'</div><div class="desc">'+ch.desc+'</div><div class="row"><div class="mp"><div class="mpf" style="width:'+pct+'%"></div></div><span>'+done+'/'+tot+'</span></div></div>';
  });
  return h;
}
function renderChapter(chId){
  const ch = CURRICULUM.find(c=>c.id===chId);
  let h = '<div class="crumb"><a data-act="hub">Trang chủ</a><span class="sep">›</span><span>'+ch.num+'</span></div><div class="card"><div class="tag">'+ch.num+'</div><div class="title">'+highlight(ch.title)+'</div><div class="desc">'+ch.desc+'</div></div>';
  ch.lessons.forEach(l=>{
    const u = isLessonUnlocked(chId, l.id);
    const d = isLessonDone(chId, l.id);
    const tagColor = !l.built ? 'gray' : '';
    const tagSuffix = !l.built ? ' • Sắp ra mắt' : '';
    h += '<div class="card '+(((!u||!l.built))?'locked':'click')+' '+(d?'done':'')+'" data-act="open-l" data-ch="'+chId+'" data-l="'+l.id+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1;min-width:0"><div class="tag '+tagColor+'">'+l.num+tagSuffix+'</div><div class="title" style="font-size:14px">'+highlight(l.title)+'</div><div class="desc">'+l.desc+'</div></div>'+(d?'<span class="badge">✓ Đạt</span>':'')+'</div></div>';
  });
  return h;
}
function renderLesson(chId,lId){
  const ch = CURRICULUM.find(c=>c.id===chId);
  const l = ch.lessons.find(x=>x.id===lId);
  const lc = LESSON_CONTENT[chId+'-'+lId];
  const p = getProgress(chId,lId);
  const tabs = [
    { id:'theory', icon:'📖', label:'Lý thuyết', unlocked:true, done:p.theorySteps>=lc.steps.length },
    { id:'practice', icon:'✏️', label:'Luyện tập', unlocked:p.theorySteps>=lc.steps.length, done:p.practice>=80 },
    { id:'game', icon:'⚡', label:'Trò chơi', unlocked:p.practice>=80, done:p.game>=70 },
    { id:'quiz', icon:'🏆', label:'Kiểm tra', unlocked:p.practice>=80, done:p.quiz>=80 }
  ];
  let h = '<div class="crumb"><a data-act="hub">Trang chủ</a><span class="sep">›</span><a data-act="open-ch" data-ch="'+chId+'">'+ch.num+'</a><span class="sep">›</span><span>'+l.num+'</span></div>';
  h += '<div class="card"><div class="tag">'+l.num+'</div><div class="title" style="font-size:15px">'+highlight(l.title)+'</div></div>';
  h += '<div class="tabs">';
  tabs.forEach(t=>{
    const cls = (lessonView.tab===t.id?'act':'') + (!t.unlocked?' lock':'');
    h += '<button class="tab '+cls+'" data-act="tab" data-tab="'+t.id+'" '+(!t.unlocked?'disabled':'')+'><span class="ic">'+t.icon+'</span>'+t.label+(t.done?' ✓':'')+'</button>';
  });
  h += '</div>';
  if(lessonView.tab==='theory') h += renderTheory(chId,lId);
  else if(lessonView.tab==='practice') h += renderPractice(chId,lId);
  else if(lessonView.tab==='game') h += renderGame(chId,lId);
  else if(lessonView.tab==='quiz') h += renderQuiz(chId,lId);
  return h;
}
function renderTheory(chId,lId){
  const lc = LESSON_CONTENT[chId+'-'+lId];
  if(lessonView.step === -1){
    const s = lc.story;
    const storyText = stripHtml(s.problem)+'. '+stripHtml(s.why);
    return '<div class="theory"><h3><span>📖 Câu chuyện mở đầu</span><button class="spk-btn" data-spk-text="'+encodeURIComponent(storyText)+'">🔊</button></h3><div class="story"><div class="story-title">⚡ Bài toán mở đầu</div>'+highlight(s.problem)+'</div><div class="compare"><div class="before"><h4>'+s.before.title+'</h4>'+highlight(s.before.body)+'</div><div class="after"><h4>'+s.after.title+'</h4>'+highlight(s.after.body)+'</div></div><div class="why"><strong>Mục tiêu bài học:</strong> '+highlight(s.why)+'</div><div class="center" style="margin-top:14px"><button class="btn" data-act="theory-start">Bắt đầu học từng bước nhỏ →</button></div></div>';
  }
  if(lessonView.step >= lc.steps.length){
    return '<div class="theory"><h3>🎉 Hoàn thành lý thuyết!</h3><p>Mika đã học xong tất cả '+lc.steps.length+' bước. Qua phần Luyện tập nhé!</p><div class="center" style="margin-top:12px"><button class="btn ok" data-act="goto-practice">Qua Luyện tập →</button></div></div>';
  }
  const step = lc.steps[lessonView.step];
  const total = lc.steps.length;
  const cur = lessonView.step;
  const p = getProgress(chId,lId);
  let dots = '';
  for(let i=0;i<total;i++){
    const cls = i===cur?'act':(i<p.theorySteps?'done':'');
    dots += '<span class="dot '+cls+'"></span>';
  }
  const fullText = step.title+'. Vì sao: '+stripHtml(step.why||'')+'. '+stripHtml(step.body);
  let h = '<div class="theory"><h3><span>Bước '+(cur+1)+'/'+total+': '+highlight(step.title)+'</span><button class="spk-btn" data-spk-text="'+encodeURIComponent(fullText)+'">🔊</button></h3>';
  if(step.why) h += '<div class="why"><strong>Vì sao quan trọng?</strong> '+highlight(step.why)+'</div>';
  if(step.analogy) h += '<div class="analogy"><strong>Ghi nhớ dễ:</strong> '+highlight(step.analogy)+'</div>';
  h += '<div class="body-text">'+highlight(step.body)+'</div>';
  h += renderDeepPractice(step, 'theory');
  h += '<div class="step-nav"><button class="btn sec" data-act="step-prev">← Trước</button><div class="step-dots">'+dots+'</div><button class="btn" data-act="step-next" id="next-btn" '+(lessonView.attempt && lessonView.attempt.passed ? '' : 'disabled')+'>Sau →</button></div>';
  h += '</div>';
  return h;
}
function renderDeepPractice(item, ctx){
  if(!lessonView.attempt) lessonView.attempt = { tries:0, passed:false, state:'idle', lastInput:'', revealed:false, history:[] };
  const a = lessonView.attempt;
  const bp = item.blueprint;
  const at = getCurrentAttempt(item);
  let h = '';
  if(bp){
    h += '<div class="blueprint"><div class="bp-tag">BƯỚC 1 · QUAN SÁT</div><h4>👀 Xem cách giải</h4><div class="bp-prob"><b>Bài:</b> '+highlight(bp.problem)+'</div><div class="bp-sol">'+highlight(bp.solution)+'</div></div>';
  }
  h += '<div class="attempt"><div class="at-tag">BƯỚC 2 · LƯỢT EM</div><h4>✏️ Em hãy thử</h4>'+
    (item.attempts ? (function(){
      const need = getMasteryRequired();
      const streak = (a.streak || 0);
      let dots = '';
      for(let k=0;k<need;k++){ dots += '<span class="m-dot ' + (k<streak?'on':'') + '"></span>'; }
      const total = getMasteryTotal(item);
      const varN = (a.currentVar || 0) % total + 1;
      return '<div class="mastery-row"><span class="m-label">Mastery: ' + dots + '</span><span class="m-progress">' + streak + '/' + need + ' đúng liên tiếp · biến thể ' + varN + '/' + total + '</span></div>';
    })() : '')+'<div class="at-prompt">'+highlight(at.prompt)+'</div>';
  if(at.type === 'yesno'){
    h += '<div class="choice-grid"><button data-act="dp-yesno" data-v="yes" '+(a.passed||a.state==='pause'?'disabled':'')+'>✓ Có</button><button data-act="dp-yesno" data-v="no" '+(a.passed||a.state==='pause'?'disabled':'')+'>✗ Không</button></div>';
  } else if(at.type === 'choice'){
    h += '<div class="choice-grid">';
    at.choices.forEach((ch,i)=>{
      let cls = '';
      // Show feedback immediately when state is 'wrong', 'correct', or 'correct-streaking'
      const showFeedback = (a.state==='wrong' || a.state==='correct' || a.state==='correct-streaking') && a.lastPicked !== undefined;
      if(showFeedback){
        if(i === at.correct) cls = 'ok';
        else if(i === a.lastPicked) cls = 'no';
      }
      const dis = (a.passed || a.state==='pause' || showFeedback) ? 'disabled' : '';
      h += '<button data-act="dp-choice" data-i="'+i+'" '+dis+' class="'+cls+'">'+highlight(ch)+'</button>';
    });
    h += '</div>';
  } else {
    h += '<input type="text" class="at-input" id="dp-input" placeholder="'+(at.placeholder||'')+'" value="'+(a.lastInput||'').replace(/"/g,'&quot;')+'" '+(a.passed||a.state==='pause'?'disabled':'')+' autocomplete="off">';
    h += '<div class="attempt-actions"><button class="btn" data-act="dp-submit" '+(a.passed||a.state==='pause'?'disabled':'')+'>Kiểm tra</button>'+(a.tries>0 && !a.passed?'<button class="btn sec" data-act="dp-reset">↻ Bắt đầu lại</button>':'')+'</div>';
  }
  if(a.history.length > 0){
    h += '<div class="attempts-trail"><span>Lượt:</span>';
    a.history.forEach((r,i)=>{ h += '<span class="at-dot '+(r?'ok':'no')+'">'+(i+1)+'</span>'; });
    h += '</div>';
  }
  if(a.state === 'wrong' && a.lastMsg){
    h += '<div class="stop-fix"><div class="sf-title">🛑 Dừng lại — kiểm tra lỗi</div><div class="sf-body">'+highlight(a.lastMsg)+'</div></div>';
  }
  if(a.state === 'pause'){
    h += '<div class="replay"><div class="rp-title">🧘 Đọc thầm trong đầu...</div><div class="rp-count" id="rp-count">'+a.pauseLeft+'</div><div class="rp-text">Đọc lại bài giải mẫu, nhẩm các bước, rồi thử lại.</div></div>';
  }
  if(a.state === 'correct-streaking'){
    h += '<div class="success-card streaking"><div class="sc-title">✅ Đúng — sang biến thể tiếp...</div><div class="sc-body">Mastery: '+(a.streak||0)+'/'+getMasteryRequired()+' đúng liên tiếp.</div></div>';
  }
  if(a.state === 'correct' && a.passed){
    h += '<div class="success-card"><div class="sc-title">🎯 Đúng rồi!</div><div class="sc-body">'+highlight(at.explanation||'')+'</div>';
    if(ctx === 'practice'){
      h += '<div style="margin-top:10px"><button class="btn ok" data-act="practice-next">Câu tiếp →</button></div>';
    }
    h += '</div>';
  }
  if(a.revealed && !a.passed){
    h += '<div class="success-card" style="background:linear-gradient(135deg,#fff7ed,#fef3c7);border-color:#fcd34d"><div class="sc-title" style="color:#92400e">📖 Đáp án</div><div class="sc-body" style="color:#78350f">'+highlight(at.explanation||'')+'<br><br>Hãy đọc kỹ rồi tiếp tục.</div>';
    if(ctx === 'practice'){
      h += '<div style="margin-top:10px"><button class="btn warn" data-act="practice-next">Câu tiếp →</button></div>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}
function renderPractice(chId,lId){
  const lc = LESSON_CONTENT[chId+'-'+lId];
  const total = lc.practice.length;
  if(lessonView.practiceIdx >= total){
    const correct = (lessonView.practiceCorrect || 0);
    const pct = Math.round(correct/total*100);
    setProgress(chId,lId,{ practice: Math.max(getProgress(chId,lId).practice, pct) });
    const win = pct >= 80;
    return '<div class="score-banner '+(win?'win':'lose')+'"><div class="big">'+correct+'/'+total+'</div><div class="lbl">Số câu đúng ('+pct+'%)</div><div style="margin-top:10px;font-size:13px">'+(win?'🎉 Tuyệt vời, Mika!':'💪 Cần ≥80% để mở Trò chơi.')+'</div><div style="margin-top:11px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn sec" data-act="practice-restart">Làm lại</button>'+(win?'<button class="btn ok" data-act="goto-game">Sang Trò chơi →</button>':'')+'</div></div>';
  }
  const item = lc.practice[lessonView.practiceIdx];
  let sgkHeader = '';
  if(item.sgk && (lessonView.practiceIdx===0 || !lc.practice[lessonView.practiceIdx-1].sgk)){
    sgkHeader = '<div class="sgk-section-header"><span class="sgk-icon">📘</span> Bài tập từ Sách giáo khoa <span class="sgk-page">trang '+item.page+'</span></div>';
  }
  let h = sgkHeader + '<div class="problem' + (item.sgk?' problem-sgk':'') + '"><div class="tiny">Câu '+(lessonView.practiceIdx+1)+'/'+total+'</div></div>';
  h += renderDeepPractice(item, 'practice');
  return h;
}
function renderGame(chId,lId){
  const lc = LESSON_CONTENT[chId+'-'+lId];
  const game = lc.game;
  if(!lessonView.gameState){ lessonView.gameState = { round:0, picked:-1, correctCount:0, streak:0, bonus:0 }; }
  const gs = lessonView.gameState;
  if(gs.round >= game.events.length){
    const max = game.events.length;
    const pct = Math.round(gs.correctCount/max*100);
    setProgress(chId,lId,{ game: Math.max(getProgress(chId,lId).game, pct) });
    const win = pct >= 70;
    return '<div class="score-banner '+(win?'win':'lose')+'"><div class="big">'+gs.correctCount+'/'+max+'</div><div class="lbl">Câu đúng ('+pct+'%) • Bonus: +'+gs.bonus+'</div><div style="margin-top:10px;font-size:13px">'+(win?'⚡ Mika quá giỏi!':'🎯 Chơi lại nhé!')+'</div><div style="margin-top:11px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn sec" data-act="game-restart">Chơi lại</button>'+(win?'<button class="btn ok" data-act="goto-quiz">Sang Kiểm tra →</button>':'')+'</div></div>';
  }
  const r = game.events[gs.round];
  let h = '<div class="energy-game"><h4>⚡ '+game.title+'</h4><div class="tiny">Vòng '+(gs.round+1)+'/'+game.events.length+' — '+game.desc+'</div>'+
    '<div class="eg-stats"><div><span class="lbl">Đúng</span><span class="v">'+gs.correctCount+'</span></div><div><span class="lbl">🔥 Streak</span><span class="v">'+gs.streak+'</span></div><div><span class="lbl">Bonus</span><span class="v">+'+gs.bonus+'</span></div></div>'+
    '<div class="eg-prob"><b>Tính:</b> '+r.q+'</div>'+
    '<div class="choice-grid">';
  r.choices.forEach((c,i)=>{
    let cls = '';
    if(gs.picked === i){ cls = (i === r.correct ? 'ok' : 'no'); }
    else if(gs.picked >= 0 && i === r.correct){ cls = 'ok'; }
    h += '<button data-act="game-pick" data-i="'+i+'" '+(gs.picked>=0?'disabled':'')+' class="'+cls+'">'+c+'</button>';
  });
  h += '</div>';
  if(gs.picked >= 0){
    h += '<div class="center" style="margin-top:10px;font-size:12px;color:#155e75"><b>'+r.exp+'</b></div>';
    h += '<div class="center" style="margin-top:10px"><button class="btn" data-act="game-next">Câu tiếp →</button></div>';
  }
  h += '</div>';
  return h;
}
function renderQuiz(chId,lId){
  const lc = LESSON_CONTENT[chId+'-'+lId];
  const total = lc.quiz.length;
  if(lessonView.quizIdx >= total){
    const correct = lessonView.quizAnswers.filter((a,i)=>a===lc.quiz[i].ans).length;
    const pct = Math.round(correct/total*100);
    setProgress(chId,lId,{ quiz: Math.max(getProgress(chId,lId).quiz, pct) });
    const win = pct >= 80;
    if(win) celebrate();
    let nextBtn = '';
    if(win){
      const ch = CURRICULUM.find(c=>c.id===chId);
      const idx = ch.lessons.findIndex(x=>x.id===lId);
      if(idx+1 < ch.lessons.length){ nextBtn = '<button class="btn ok" data-act="open-l" data-ch="'+chId+'" data-l="'+ch.lessons[idx+1].id+'">Bài tiếp →</button>'; }
    }
    return '<div class="score-banner '+(win?'win':'lose')+'"><div class="big">'+correct+'/'+total+'</div><div class="lbl">Điểm KT ('+pct+'%)</div><div style="margin-top:10px;font-size:13px">'+(win?'🏆 Mika đã ĐẠT!':'📚 Cần ≥80%, Mika ơi.')+'</div><div style="margin-top:11px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn sec" data-act="quiz-restart">Làm lại</button>'+(!win?'<button class="btn warn" data-act="goto-theory">Ôn lại</button>':'')+nextBtn+'</div></div>';
  }
  const q = lc.quiz[lessonView.quizIdx];
  let h = '<div class="problem"><div class="tiny">Câu '+(lessonView.quizIdx+1)+'/'+total+' • Cần 80%</div><div class="problem-q" style="margin-top:5px">'+highlight(q.q)+'</div><div class="opts">';
  q.opts.forEach((o,i)=>{ h += '<button class="opt" data-act="quiz-ans" data-i="'+i+'">'+highlight(o)+'</button>'; });
  h += '</div></div>';
  return h;
}

function attachEvents(){
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      handleAction(el.dataset.act, el);
    });
  });
  document.querySelectorAll('[data-spk-text]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      speak(el, decodeURIComponent(el.dataset.spkText));
    });
  });
  const inp = document.getElementById('dp-input');
  if(inp && !inp.disabled) inp.focus();
  if(inp){ inp.addEventListener('keydown', e=>{ if(e.key === 'Enter'){ e.preventDefault(); handleDeepSubmit(inp.value); } }); }
}
function handleAction(act, el){
  switch(act){
    case 'hub': view = {type:'hub'}; resetLessonView(); render(); break;
    case 'open-ch': view = {type:'chapter', chId:el.dataset.ch}; resetLessonView(); render(); break;
    case 'open-l': {
      const chId = el.dataset.ch, lId = el.dataset.l;
      const ch = CURRICULUM.find(c=>c.id===chId);
      const l = ch.lessons.find(x=>x.id===lId);
      if(!isLessonBuilt(chId,lId)){ showToast('🛠️ Bài này đang được xây dựng. Sắp ra mắt!'); return; }
      if(!l.built){ showToast('🚧 Bài này đang phát triển.'); return; }
      view = {type:'lesson', chId:chId, lId:lId};
      resetLessonView();
      const p = getProgress(chId,lId);
      lessonView.step = p.theorySteps > 0 ? p.theorySteps : -1;
      const lc = LESSON_CONTENT[chId+'-'+lId];
      if(lessonView.step >= lc.steps.length) lessonView.step = lc.steps.length - 1;
      render(); break;
    }
    case 'tab': lessonView.tab = el.dataset.tab; lessonView.practiceIdx=0; lessonView.practiceCorrect=0; lessonView.quizIdx=0; lessonView.quizAnswers=[]; lessonView.gameState=null; lessonView.attempt=null; render(); break;
    case 'theory-start': lessonView.step = 0; lessonView.attempt = null; render(); break;
    case 'step-prev':
      stopReplay();
      if(lessonView.step > 0){ lessonView.step--; lessonView.attempt = null; render(); }
      else if(lessonView.step === 0){ lessonView.step = -1; lessonView.attempt = null; render(); }
      break;
    case 'step-next': {
      stopReplay();
      lessonView.step++;
      lessonView.attempt = null;
      const p = getProgress(view.chId,view.lId);
      setProgress(view.chId,view.lId,{ theorySteps: Math.max(p.theorySteps, lessonView.step) });
      render(); break;
    }
    case 'dp-submit': { const inp = document.getElementById('dp-input'); handleDeepSubmit(inp ? inp.value : ''); break; }
    case 'dp-yesno': handleDeepSubmit(el.dataset.v); break;
    case 'dp-choice': handleDeepSubmit(parseInt(el.dataset.i)); break;
    case 'dp-reset': lessonView.attempt = null; render(); break;
    case 'practice-next': {
      if(lessonView.attempt && lessonView.attempt.passed && !lessonView.attempt.revealed){
        lessonView.practiceCorrect = (lessonView.practiceCorrect||0) + 1;
      }
      lessonView.practiceIdx++;
      lessonView.attempt = null;
      stopReplay();
      render(); break;
    }
    case 'practice-restart': lessonView.practiceIdx=0; lessonView.practiceCorrect=0; lessonView.attempt=null; render(); break;
    case 'quiz-ans': handleQuizAnswer(parseInt(el.dataset.i)); break;
    case 'quiz-restart': lessonView.quizIdx=0; lessonView.quizAnswers=[]; render(); break;
    case 'game-pick': handleGamePick(parseInt(el.dataset.i)); break;
    case 'game-next': handleGameNext(); break;
    case 'game-restart': lessonView.gameState = null; render(); break;
    case 'goto-practice': lessonView.tab='practice'; lessonView.practiceIdx=0; lessonView.practiceCorrect=0; lessonView.attempt=null; render(); break;
    case 'goto-game': lessonView.tab='game'; lessonView.gameState=null; render(); break;
    case 'goto-quiz': lessonView.tab='quiz'; lessonView.quizIdx=0; lessonView.quizAnswers=[]; render(); break;
    case 'goto-theory': lessonView.tab='theory'; lessonView.step=-1; lessonView.attempt=null; render(); break;
  }
}
function handleDeepSubmit(input){
  const item = getCurrentDpItem();
  if(!item) return;
  const at = getCurrentAttempt(item);
  if(!at) return;
  if(!lessonView.attempt) lessonView.attempt = { tries:0, passed:false, state:'idle', lastInput:'', revealed:false, history:[], currentVar:0, streak:0 };
  const a = lessonView.attempt;
  if(typeof a.currentVar !== 'number') a.currentVar = 0;
  if(typeof a.streak !== 'number') a.streak = 0;
  if(a.passed || a.state === 'pause') return;
  a.lastInput = input;
  a.lastPicked = input;
  const result = validateAttempt(at, input);
  a.tries++;
  a.history.push(result.ok);
  if(item.attempts && Array.isArray(item.attempts)){
    if(result.ok){
      a.streak++;
      if(a.streak >= getMasteryRequired()){
        a.passed = true;
        a.state = 'correct';
      } else {
        a.state = 'correct-streaking';
        // After 1.8s, advance to next variation and reset visual feedback
        setTimeout(()=>{
          if(lessonView.attempt && lessonView.attempt.state === 'correct-streaking'){
            lessonView.attempt.currentVar = (lessonView.attempt.currentVar || 0) + 1;
            lessonView.attempt.state = 'idle';
            lessonView.attempt.lastInput = '';
            lessonView.attempt.lastPicked = undefined;
            render();
          }
        }, 1800);
      }
    } else {
      a.state = 'wrong';
      a.streak = 0;
      a.lastMsg = result.msg || '<b>Chưa đúng.</b> Đọc lại bài, nhẩm trong đầu, rồi thử lại.';
      if(a.tries >= 8){
        a.revealed = true;
        a.passed = true;
        a.state = 'correct';
      }
    }
  } else {
    if(result.ok){ a.passed = true; a.state = 'correct'; }
    else {
      a.state = 'wrong';
      a.lastMsg = result.msg || '<b>Chưa đúng.</b>';
      if(a.tries >= 3){ a.revealed = true; a.passed = true; a.state = 'correct'; }
    }
  }
  render();
  if(!a.passed && !a.revealed && a.state === 'wrong'){ setTimeout(()=>startReplay(), 500); }
}
function startReplay(){
  const a = lessonView.attempt;
  if(!a) return;
  a.state = 'pause';
  a.pauseLeft = 5;
  render();
  replayTimer = setInterval(()=>{
    a.pauseLeft--;
    const el = document.getElementById('rp-count');
    if(el) el.textContent = a.pauseLeft;
    if(a.pauseLeft <= 0){
      clearInterval(replayTimer); replayTimer = null;
      a.state = 'idle';
      a.lastInput = '';
      a.lastPicked = undefined;
      const item = getCurrentDpItem();
      if(item && item.attempts){ a.currentVar = (a.currentVar || 0) + 1; }
      render();
    }
  }, 1000);
}
function stopReplay(){ if(replayTimer){ clearInterval(replayTimer); replayTimer = null; } }
function resetLessonView(){
  stopReplay();
  lessonView = { tab:'theory', step:-1, attempt:null, practiceIdx:0, practiceCorrect:0, quizIdx:0, quizAnswers:[], gameState:null };
}
function handleQuizAnswer(i){
  const lc = LESSON_CONTENT[view.chId+'-'+view.lId];
  const q = lc.quiz[lessonView.quizIdx];
  lessonView.quizAnswers.push(i);
  const opts = document.querySelectorAll('.problem .opt');
  opts.forEach((o,idx)=>{
    o.disabled = true;
    if(idx === q.ans) o.classList.add('ok');
    else if(idx === i) o.classList.add('no');
  });
  setTimeout(()=>{ lessonView.quizIdx++; render(); }, 1100);
}
function handleGamePick(i){
  const gs = lessonView.gameState;
  if(gs.picked >= 0) return;
  const lc = LESSON_CONTENT[view.chId+'-'+view.lId];
  const r = lc.game.events[gs.round];
  gs.picked = i;
  if(i === r.correct){
    gs.correctCount++;
    gs.streak++;
    if(gs.streak >= 3) gs.bonus++;
  } else { gs.streak = 0; }
  render();
}
function handleGameNext(){
  const gs = lessonView.gameState;
  gs.round++;
  gs.picked = -1;
  render();
}
function attachTooltipTaps(){
  document.querySelectorAll('.tip').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      document.querySelectorAll('.tip.act').forEach(t=>{ if(t!==el) t.classList.remove('act'); });
      el.classList.toggle('act');
    });
  });
  document.addEventListener('click', ()=>{ document.querySelectorAll('.tip.act').forEach(t=>t.classList.remove('act')); });
}
function showToast(msg){
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:1000;max-width:90%;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.25)';
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}
function celebrate(){
  const colors = ['#0e7490','#0891b2','#06b6d4','#0ea5e9','#3b82f6','#4f46e5'];
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.style.cssText = 'position:fixed;width:8px;height:8px;background:'+colors[i%colors.length]+';top:-10px;left:'+(Math.random()*100)+'%;z-index:1000;border-radius:2px;pointer-events:none';
    document.body.appendChild(c);
    const dur = 1500 + Math.random()*1500;
    c.animate([{transform:'translateY(0) rotate(0)',opacity:1},{transform:'translateY('+(window.innerHeight+20)+'px) rotate(1080deg)',opacity:.6}], {duration:dur,easing:'ease-in'});
    setTimeout(()=>c.remove(), dur);
  }
}

render();
</script>

<script>
(function(){var b=document.getElementById('backHome');if(b&&!location.pathname.includes('/lessons/'))b.style.display='none';})();
</script>
