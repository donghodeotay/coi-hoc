function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

function highlight(text){
  if(!text) return '';
  const keys = Object.keys(TERMS).sort((a,b)=>b.length-a.length);
  const placeholders = [];
  const parts = String(text).split(/(<[^>]*>)/g);
  const processed = parts.map((part, idx) => {
    if(idx % 2 === 1) return part;
    let out = part;
    keys.forEach(k=>{
      const re = new RegExp(escRe(k),'gi');
      out = out.replace(re, m=>{
        const id = 'XPH'+placeholders.length+'XPH';
        placeholders.push({id:id, html:'<span class="tip" data-en="'+TERMS[k]+'">'+m+'</span>'});
        return id;
      });
    });
    return out;
  });
  let final = processed.join('');
  placeholders.forEach(p=>{ final = final.split(p.id).join(p.html); });
  return final;
}

let currentSpeakBtn = null;
function stripHtml(html){
  const div = document.createElement('div'); div.innerHTML = html;
  return (div.textContent || div.innerText || '').replace(/\s+/g,' ').trim();
}
function speak(btn, text){
  if(!('speechSynthesis' in window)){ alert('Trình duyệt không hỗ trợ đọc tiếng Việt.'); return; }
  if(window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();
    if(currentSpeakBtn){ currentSpeakBtn.classList.remove('playing'); currentSpeakBtn.textContent='🔊'; }
    if(currentSpeakBtn === btn){ currentSpeakBtn = null; return; }
  }
  const plain = stripHtml(text);
  if(!plain) return;
  const u = new SpeechSynthesisUtterance(plain);
  u.lang = 'vi-VN'; u.rate = 0.92;
  u.onend = ()=>{ btn.classList.remove('playing'); btn.textContent='🔊'; if(currentSpeakBtn===btn) currentSpeakBtn=null; };
  u.onerror = u.onend;
  btn.classList.add('playing'); btn.textContent='⏸';
  currentSpeakBtn = btn;
  window.speechSynthesis.speak(u);
}

function renderGraph(a, b, c, eqLabel, range){
  range = range || 7;
  const w = 280, h = 280;
  const px = x => (x+range)*(w/(range*2));
  const py = y => h - (y+range)*(h/(range*2));
  let svg = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="background:#fff;border-radius:8px;border:1px solid var(--border);max-width:100%">';
  for(let i=-range;i<=range;i++){
    svg += '<line x1="'+px(i)+'" y1="0" x2="'+px(i)+'" y2="'+h+'" stroke="#f3f4f6" stroke-width="1"/>';
    svg += '<line x1="0" y1="'+py(i)+'" x2="'+w+'" y2="'+py(i)+'" stroke="#f3f4f6" stroke-width="1"/>';
  }
  svg += '<line x1="'+px(0)+'" y1="0" x2="'+px(0)+'" y2="'+h+'" stroke="#9ca3af" stroke-width="1.5"/>';
  svg += '<line x1="0" y1="'+py(0)+'" x2="'+w+'" y2="'+py(0)+'" stroke="#9ca3af" stroke-width="1.5"/>';
  svg += '<text x="'+(w-12)+'" y="'+(py(0)-6)+'" font-size="11" fill="#6b7280">x</text>';
  svg += '<text x="'+(px(0)+6)+'" y="12" font-size="11" fill="#6b7280">y</text>';
  for(let i=-range;i<=range;i+=2){
    if(i!==0){
      svg += '<text x="'+px(i)+'" y="'+(py(0)+13)+'" font-size="9" fill="#9ca3af" text-anchor="middle">'+i+'</text>';
      svg += '<text x="'+(px(0)-5)+'" y="'+(py(i)+3)+'" font-size="9" fill="#9ca3af" text-anchor="end">'+i+'</text>';
    }
  }
  if(b !== 0){
    const x1=-range, x2=range, y1=(c-a*x1)/b, y2=(c-a*x2)/b;
    svg += '<line x1="'+px(x1)+'" y1="'+py(y1)+'" x2="'+px(x2)+'" y2="'+py(y2)+'" stroke="#6b46c1" stroke-width="2.5" opacity="0.85"/>';
  }
  const dots = [];
  for(let x=-3;x<=8;x++){
    if(b!==0){ const y=(c-a*x)/b; if(y>=-range&&y<=range) dots.push([x,y]); }
  }
  dots.slice(0,9).forEach((p,i)=>{
    svg += '<circle cx="'+px(p[0])+'" cy="'+py(p[1])+'" r="0" fill="#10b981" stroke="#fff" stroke-width="2"><animate attributeName="r" from="0" to="6" dur="0.4s" begin="'+(i*0.35+0.5)+'s" fill="freeze"/></circle>';
    svg += '<text x="'+px(p[0])+'" y="'+(py(p[1])-10)+'" font-size="10" fill="#065f46" text-anchor="middle" opacity="0" font-weight="600"><animate attributeName="opacity" from="0" to="0.9" dur="0.4s" begin="'+(i*0.35+0.5)+'s" fill="freeze"/>('+p[0]+';'+p[1]+')</text>';
  });
  svg += '<text x="'+(w/2)+'" y="20" font-size="13" fill="#4c1d95" text-anchor="middle" font-weight="600">'+eqLabel+'</text>';
  svg += '</svg>';
  return '<div class="graph-wrap">'+svg+'<div class="graph-info">📍 Each green dot is a solution — they continue forever in both directions!</div></div>';
}

function norm(s){
  if(s === undefined || s === null) return '';
  return String(s).toLowerCase().replace(/\s+/g,'').replace(/[·×*]/g,'').replace(/[\-−–—]/g,'-').replace(/[≠]/g,'!=').trim();
}
function validateAttempt(attempt, userInput){
  if(attempt.type === 'yesno'){
    if(userInput === attempt.correct) return { ok:true };
    if(attempt.errorMsg) return { ok:false, msg:attempt.errorMsg };
    return { ok:false };
  }
  const u = norm(userInput);
  if(!u) return { ok:false, msg:'Em hãy nhập câu trả lời trước nhé.' };
  if(attempt.validate) return attempt.validate(userInput, u);
  for(const a of (attempt.answers||[])){ if(norm(a) === u) return { ok:true }; }
  for(const e of (attempt.errors||[])){
    if(e.pat && e.pat.test(userInput)) return { ok:false, msg:e.msg };
    if(e.match && norm(e.match) === u) return { ok:false, msg:e.msg };
  }
  return { ok:false };
}

        body:'<span class="sgk-ref">📘 SGK trang 12 — Vận dụng 1</span> Quay lại bài cải bắp: gọi <b>x</b> = số luống, <b>y</b> = số cây mỗi luống. Hệ phương trình:<br>{(x+8)(y−3) − xy = −108, (x−4)(y+2) − xy = 64}<br>Khai triển: {-3x + 8y = -108+24 = -84, 2x - 4y = 64+8 = 72}<br>Đơn giản: {-3x + 8y = -84, 2x - 4y = 72} → {3x - 8y = 84, x - 2y = 36}<br>Từ pt(2): x = 36 + 2y. Thế: 3(36 + 2y) - 8y = 84 → 108 + 6y - 8y = 84 → -2y = -24 → y = 12.<br>x = 36 + 24 = 60.<br>→ Vườn có <b>60 luống × 12 cây = 720 cây</b>.',

  'ch1-l3': {

        body:`Quy trình giải bài toán bằng cách lập hệ:<br><b>B1:</b> Gọi 2 ẩn x, y (đặt tên cho 2 điều chưa biết, đơn vị, điều kiện).<br><b>B2:</b> Viết 2 phương trình từ 2 điều kiện trong đề.<br><b>B3:</b> Giải hệ phương trình.<br><b>B4:</b> Kiểm tra điều kiện và kết luận.`,

          {type:'choice',prompt:`<b>Lượt em (4/5):</b> Tại sao đặt điều kiện cho ẩn (vd x > 0)?`,choices:['Để dễ giải','Vì số người không thể âm','Theo quy ước','Không cần thiết'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},

  'ch2-l1': {
    title:`Bài 4 — Phương trình quy về phương trình bậc nhất một ẩn`,

    story:{
      problem:`Đôi khi phương trình em gặp <em>không có dạng ax + b = 0</em> ngay — vd: (x−3)(x+2) = 0, hay 3/(x−1) = 5. Bài 4 dạy <b>quy về</b> dạng cơ bản để giải.`,
      before:{title:'Trước bài này',body:`Em đã giải phương trình bậc nhất 1 ẩn (lớp 8). Còn nhiều dạng phức tạp hơn.`},
      after:{title:'Sau bài này',body:`Em giải được 2 dạng phương trình quy về bậc nhất: phương trình tích A·B = 0 và phương trình chứa ẩn ở mẫu. Biết kiểm tra điều kiện và loại nghiệm sai.`},
      why:`Mọi phương trình "phức tạp" ở lớp 9 thực ra là các bước đưa về dạng đơn giản em đã biết.`
    },
    steps:[
      {
        title:`Mở đầu — phương trình bậc nhất 1 ẩn (review)`,
        why:`Cần nhớ lại trước khi học dạng mới.`,
        analogy:`<strong>Cân thăng bằng</strong> ⚖️ — ax + b = 0 → x = −b/a (với a ≠ 0).`,
        body:`Phương trình bậc nhất 1 ẩn: <b>ax + b = 0</b> (a ≠ 0). Cách giải: chuyển b sang vế phải (đổi dấu) → x = −b/a.`,
        blueprint:{problem:`3x + 6 = 0. Tìm x.`,solution:`3x = −6 → x = −2.`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> Giải 2x − 8 = 0:`,choices:['x = 4','x = -4','x = 8','x = 0'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> Giải 5x = 15:`,choices:['x = 3','x = 5','x = 10','x = 15'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (3/5):</b> Giải −x + 7 = 0:`,choices:['x = 7','x = -7','x = 0','x = 1'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (4/5):</b> Phương trình ax + b = 0 với a = 0 luôn có nghiệm?`,correct:'no',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (5/5):</b> Giải 4x − 12 = 0:`,choices:['x = 3','x = -3','x = 4','x = 12'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Phương trình tích A · B = 0`,
        why:`Khi tích = 0, một trong các thừa số phải = 0.`,
        analogy:`<strong>Khoá kép</strong> 🔐 — A·B = 0 → một trong A hoặc B (hoặc cả hai) phải = 0.`,
        body:`Quy tắc: <b>A · B = 0 ⟺ A = 0 hoặc B = 0</b>. Áp dụng cho mọi phương trình ở dạng tích.`,
        blueprint:{problem:`(x − 2)(x + 5) = 0`,solution:`x − 2 = 0 hoặc x + 5 = 0 → x = 2 hoặc x = −5.`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> Giải (x − 3)(x + 1) = 0:`,choices:['x = 3 hoặc x = -1','x = -3 hoặc x = 1','x = 3','x = -1'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> Giải (2x − 4)(x − 5) = 0:`,choices:['x = 2 hoặc x = 5','x = 4 hoặc x = 5','x = -2 hoặc x = 5','x = 2 hoặc x = -5'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (3/5):</b> Phương trình (x−1)(x−2)(x−3) = 0 có 3 nghiệm: 1, 2, 3?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (4/5):</b> (x + 4)(x − 7) = 0. Tổng 2 nghiệm:`,choices:['3','-3','11','-11'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (5/5):</b> (3x − 6)(x + 8) = 0. Nghiệm dương:`,choices:['2','6','3','8'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Phương trình chứa ẩn ở mẫu — điều kiện xác định`,
        why:`Mẫu khác 0!`,
        analogy:`<strong>Sàn nhà</strong> 🏠 — Mẫu là sàn — nó phải vững (≠ 0) trước khi em đi lên.`,
        body:`Phương trình có ẩn ở mẫu (vd: 3/(x−1) = 5). <b>Điều kiện xác định:</b> mẫu phải khác 0. Phải đặt điều kiện TRƯỚC khi giải.`,
        blueprint:{problem:`Phương trình 5/(x − 2) = 1. Điều kiện?`,solution:`x − 2 ≠ 0 → x ≠ 2.`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> Điều kiện cho 1/(x − 5) = 3:`,choices:['x ≠ 5','x = 5','x ≠ 0','x > 5'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> Điều kiện cho 2/(x + 4) = 0:`,choices:['x ≠ -4','x = -4','x ≠ 0','x > 0'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (3/5):</b> Phương trình có ẩn ở mẫu PHẢI đặt điều kiện trước?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (4/5):</b> Điều kiện cho 1/x + 1/(x − 1) = 1:`,choices:['x ≠ 0','x ≠ 1','Cả hai','Không cần'],correct:2,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (5/5):</b> Nếu nghiệm tìm được = giá trị đã loại (vd x = 2 mà x ≠ 2), em loại nghiệm đó?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Giải phương trình chứa ẩn ở mẫu`,
        why:`Quy đồng → giải pt cơ bản → kiểm tra đk.`,
        analogy:`<strong>Đồng quy</strong> 🌊 — Đưa các phân số về cùng mẫu để cộng/trừ được.`,
        body:`Quy trình:<br><b>B1:</b> Đặt điều kiện (mẫu ≠ 0).<br><b>B2:</b> Quy đồng mẫu, khử mẫu → phương trình bậc nhất.<br><b>B3:</b> Giải.<br><b>B4:</b> Đối chiếu điều kiện. Nếu nghiệm bị loại → vô nghiệm.`,
        blueprint:{problem:`Giải 2/(x − 1) = 4`,solution:`B1: x ≠ 1. B2: 2 = 4(x − 1) → 2 = 4x − 4. B3: 4x = 6 → x = 3/2. B4: x = 3/2 ≠ 1 ✓ → nghiệm hợp lệ.`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> Giải 6/(x − 2) = 3 (x ≠ 2):`,choices:['x = 4','x = 0','x = 2','x = 6'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> Giải 5/(x + 1) = 1 (x ≠ -1):`,choices:['x = 4','x = -4','x = 5','x = -5'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (3/5):</b> Sau khi giải, x = 3 là điều kiện loại (x ≠ 3) → vô nghiệm?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (4/5):</b> Giải 1/x = 2:`,choices:['x = 1/2','x = 2','x = 1','x = -1/2'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (5/5):</b> Sau khi tìm x từ phương trình ẩn ở mẫu, BƯỚC CUỐI là?`,choices:['Kết luận','Đối chiếu điều kiện','Vẽ đồ thị','Đoán'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Khi nghiệm bị loại`,
        why:`Trường hợp đặc biệt: phương trình vô nghiệm.`,
        analogy:`<strong>Bộ lọc</strong> 🪤 — Nghiệm rơi qua lưới (không thoả điều kiện) → bị loại.`,
        body:`Khi giải xong, nếu nghiệm tìm được trùng với giá trị đã LOẠI ở điều kiện, ta phải LOẠI nghiệm đó. Có thể dẫn đến phương trình <b>vô nghiệm</b>.`,
        blueprint:{problem:`Giải 1/(x − 2) = 3/(x − 2)`,solution:`x ≠ 2. Phương trình → 1 = 3 (vô lý). Hoặc nếu x = 2 → loại. Vậy <b>vô nghiệm</b>.`},
        attempts:[
          {type:'yesno',prompt:`<b>Lượt em (1/5):</b> Sau khi giải, x = 2 mà điều kiện là x ≠ 2 → loại nghiệm này?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> 1/(x − 1) = 1/(x − 1) (x ≠ 1) → 1 = 1 (luôn đúng). Số nghiệm:`,choices:['1','0 (vô nghiệm)','Vô số','Không xác định'],correct:2,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (3/5):</b> 1/(x − 5) = 0 (x ≠ 5):`,choices:['x = 5','Vô nghiệm','x = 0','Vô số'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (4/5):</b> Nếu sau khi giải mọi giá trị x đều bị loại → phương trình vô nghiệm?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (5/5):</b> Phương trình có thể có:`,choices:['Chỉ 1 nghiệm','Vô nghiệm hoặc có nghiệm','Luôn 0','Luôn vô số'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Phương trình chứa căn (giới thiệu)`,
        why:`Không còn trong Tập 1 nhưng đáng nhắc.`,
        analogy:`<strong>Hộp đen</strong> 📦 — Căn là hộp đen — em phải "mở" (bình phương) để biết bên trong.`,
        body:`√A = B (với B ≥ 0). Bình phương 2 vế: A = B². Sau đó kiểm tra điều kiện.`,
        blueprint:{problem:`√(x − 1) = 3`,solution:`B1: x ≥ 1. B2: x − 1 = 9 → x = 10. B3: 10 ≥ 1 ✓ → nghiệm.`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> Giải √x = 5:`,choices:['x = 25','x = 5','x = ±5','Vô nghiệm'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (2/5):</b> Phương trình √x = -2 có nghiệm?`,correct:'no',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (3/5):</b> Điều kiện cho √(x − 4) là?`,choices:['x ≥ 4','x = 4','x > 0','Bất kỳ'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (4/5):</b> Để giải √A = B, ta:`,choices:['Bình phương 2 vế','Cộng B vào','Khai căn lần nữa','Bỏ căn'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (5/5):</b> Sau khi bình phương, có thể xuất hiện nghiệm không hợp lệ → cần kiểm tra?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Phương trình bậc 2 (preview)`,
        why:`Sẽ học sâu ở Tập 2 — biết qua trước.`,
        analogy:`<strong>Hai chìa khoá</strong> 🔑🔑 — Bậc 2 thường có 2 nghiệm.`,
        body:`ax² + bx + c = 0 (a ≠ 0). Có thể đưa về dạng tích (x − x₁)(x − x₂) = 0 nếu phân tích được.`,
        blueprint:{problem:`x² − 5x + 6 = 0`,solution:`Phân tích: (x − 2)(x − 3) = 0 → x = 2 hoặc x = 3.`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> x² − 9 = 0:`,choices:['x = 3','x = 3 hoặc x = -3','x = ±9','Vô nghiệm'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> x² = 16:`,choices:['x = 4','x = ±4','x = 16','x = 8'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (3/5):</b> Phương trình bậc 2 luôn có 2 nghiệm phân biệt?`,correct:'no',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (4/5):</b> x² − 4x + 4 = 0:`,choices:['(x-2)² = 0, 1 nghiệm x = 2','2 nghiệm khác nhau','Vô nghiệm','x = 4'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (5/5):</b> x² + 1 = 0:`,choices:['x = ±1','x = 1','Vô nghiệm thực','x = 0'],correct:2,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Mẹo: nhận dạng phương trình`,
        why:`Đọc đề → biết loại → áp dụng cách phù hợp.`,
        analogy:`<strong>Bác sĩ chẩn đoán</strong> 👨‍⚕️ — Nhìn triệu chứng → biết bệnh → biết cách chữa.`,
        body:`<b>(...)(...) = 0</b> → phương trình tích, giải A=0 hoặc B=0.<br><b>x ở mẫu</b> → đặt điều kiện trước, quy đồng.<br><b>√A</b> → bình phương 2 vế.<br><b>x²</b> → phương trình bậc 2 (đợi Tập 2).`,
        blueprint:{problem:`Phương trình (x − 1)(x + 2) = 0 thuộc loại?`,solution:`Phương trình tích.`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> Phương trình 2/(x+1) = 5 thuộc loại?`,choices:['Bậc nhất','Tích','Chứa ẩn ở mẫu','Bậc 2'],correct:2,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> (3x-6)(x+1) = 0 loại nào?`,choices:['Bậc nhất','Tích','Bậc 2','Chứa căn'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (3/5):</b> √(x+3) = 4 loại nào?`,choices:['Bậc nhất','Tích','Chứa căn','Bậc 2'],correct:2,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (4/5):</b> 2x + 5 = 11 loại nào?`,choices:['Bậc nhất','Tích','Chứa ẩn ở mẫu','Bậc 2'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (5/5):</b> Quy trình giải khác nhau giữa các loại?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Áp dụng vào bài toán thực tế`,

  'ch2-l2': {
    title:`Bài 5 — Bất đẳng thức và tính chất`,
    sgkPages:`SGK trang 33-37`,
    story:{
      problem:`Đến giờ em làm việc với <b>=</b>. Bài 5 dạy em làm việc với <b>&lt; &gt; ≤ ≥</b> — so sánh, không bằng nhau.`,
      before:{title:'Trước bài này',body:`Em biết phương trình (=) và cách giải.`},
      after:{title:'Sau bài này',body:`Em biết khái niệm bất đẳng thức và 4 tính chất cơ bản: cộng, nhân số dương, nhân số âm (đảo dấu!), bắc cầu.`},
      why:`Bất đẳng thức là nền tảng cho bất phương trình (Bài 6) và rất nhiều bài toán đời thực (so sánh giá, tốc độ, kích thước).`
    },
    steps:[
      {
        title:`Mở đầu — bất đẳng thức là gì`,
        why:`Phân biệt bất đẳng thức với phương trình.`,
        analogy:`<strong>Cân lệch</strong> ⚖️ — Một bên nặng hơn (>) hoặc nhẹ hơn (<).`,
        body:`Bất đẳng thức là khẳng định về thứ tự hai số: a < b, a > b, a ≤ b, a ≥ b. Khác với phương trình (a = b).`,
        blueprint:{problem:`5 < 7 đúng hay sai?`,solution:`Đúng, vì 5 nhỏ hơn 7.`},
        attempts:[
          {type:'yesno',prompt:`<b>Lượt em (1/5):</b> 3 < 5 đúng?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (2/5):</b> 7 > 9 đúng?`,correct:'no',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (3/5):</b> -2 < -5 đúng?`,correct:'no',errorMsg:`<b>STOP.</b> -2 lớn hơn -5 (vì gần 0 hơn).`,explanation:`❌ KHÔNG. -2 > -5.`},
          {type:'yesno',prompt:`<b>Lượt em (4/5):</b> 4 ≤ 4 đúng?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng. ≤ cho phép bằng.`},
          {type:'choice',prompt:`<b>Lượt em (5/5):</b> Ký hiệu "lớn hơn hoặc bằng":`,choices:['<','>','≤','≥'],correct:3,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`So sánh hai số — quy tắc nhanh`,
        why:`Nhìn dấu trước, sau đó nhìn độ lớn.`,
        analogy:`<strong>Trục số</strong> 📏 — Số bên phải lớn hơn số bên trái.`,
        body:`Số dương > 0 > Số âm. Trong số dương: số có giá trị lớn hơn thì lớn hơn. Trong số âm: số có giá trị tuyệt đối nhỏ hơn thì lớn hơn (vd -2 > -5).`,
        blueprint:{problem:`So sánh -3 và -8.`,solution:`|-3| = 3 < |-8| = 8 nhưng -3 GẦN 0 hơn -8 → -3 > -8.`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> -3 và -7. Số nào lớn hơn?`,choices:['-3','-7','Bằng nhau','Không xác định'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> 0 và -1:`,choices:['0 > -1','0 < -1','Bằng','Không'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (3/5):</b> -100 và 1:`,choices:['-100 > 1','-100 < 1','Bằng','Không'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (4/5):</b> Mọi số dương lớn hơn mọi số âm?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (5/5):</b> -5 và -2:`,choices:['-5 < -2','-5 > -2','-5 = -2','Không xác định'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Tính chất 1: Cộng/trừ cùng số`,
        why:`Cộng/trừ cùng 1 số vào 2 vế — bất đẳng thức KHÔNG đổi.`,
        analogy:`<strong>Hai bên cân</strong> ⚖️ — Thêm cùng cân nặng vào cả 2 bên — tỷ lệ không đổi.`,
        body:`Nếu a < b thì a + c < b + c (với mọi c). Tương tự cho >, ≤, ≥.`,
        blueprint:{problem:`3 < 5. Cộng 4 vào hai vế.`,solution:`3 + 4 = 7. 5 + 4 = 9. 7 < 9 ✓.`},
        attempts:[
          {type:'yesno',prompt:`<b>Lượt em (1/5):</b> 5 < 8 → 5 + 3 < 8 + 3 đúng?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (2/5):</b> 10 > 4 → 10 - 2 > 4 - 2 đúng?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (3/5):</b> Nếu x > 5, thì x + 7 > ?`,choices:['7','12','x','5'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (4/5):</b> Nếu y < 10, thì y - 3 < ?`,choices:['10','7','3','y'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (5/5):</b> Cộng số ÂM cũng được, BĐT vẫn không đổi chiều?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Tính chất 2: Nhân số DƯƠNG`,
        why:`Nhân/chia cùng số DƯƠNG — BĐT không đổi.`,
        analogy:`<strong>Phóng to ảnh</strong> 🔍 — Phóng to cả 2 bằng cùng tỉ lệ → tỷ lệ giữ nguyên.`,
        body:`Nếu a < b và c > 0 thì a · c < b · c. Tương tự cho >, ≤, ≥.`,
        blueprint:{problem:`3 < 5. Nhân 2 vào hai vế.`,solution:`3·2 = 6. 5·2 = 10. 6 < 10 ✓.`},
        attempts:[
          {type:'yesno',prompt:`<b>Lượt em (1/5):</b> 4 < 6 → 4·3 < 6·3 đúng?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (2/5):</b> 2 < 5, nhân với 4: KQ?`,choices:['8 < 20','8 > 20','2 < 5','5 < 8'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (3/5):</b> Chia với số dương cũng giữ chiều BĐT?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`},
          {type:'choice',prompt:`<b>Lượt em (4/5):</b> 10 > 4, chia 2:`,choices:['5 > 2','5 < 2','5 = 2','Không xác định'],correct:0,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},
          {type:'yesno',prompt:`<b>Lượt em (5/5):</b> Nhân với 0.5 (số dương) cũng giữ chiều?`,correct:'yes',errorMsg:`<b>STOP.</b> Hãy nhẩm lại.`,explanation:`✅ Đúng.`}
        ]
      },
      {
        title:`Tính chất 3: Nhân số ÂM (ĐẢO DẤU!)`,
        why:`Nhân/chia cùng số ÂM — BĐT ĐỔI CHIỀU.`,
        analogy:`<strong>Lật gương</strong> 🪞 — Nhân âm = lật. Trái thành phải, < thành >.`,
        body:`Nếu a < b và c < 0 thì a · c > b · c (chú ý DẤU ĐỔI!).`,
        blueprint:{problem:`3 < 5. Nhân -2 vào hai vế.`,solution:`3·(-2) = -6. 5·(-2) = -10. -6 > -10 (CHÚ Ý ĐẢO).`},
        attempts:[
          {type:'choice',prompt:`<b>Lượt em (1/5):</b> 4 < 6, nhân -1:`,choices:['-4 < -6','-4 > -6','-4 = -6','Không'],correct:1,errorMsg:`<b>STOP.</b> Đáp án khác.`,explanation:`✅ Đúng.`},

let state = loadState();
let view = { type:'hub' };
let lessonView = { tab:'theory', step:-1, attempt:null, practiceIdx:0, practiceCorrect:0, quizIdx:0, quizAnswers:[], gameState:null };
let replayTimer = null;

function loadState(){
  try { const s = localStorage.getItem('toan9-progress'); if(s) return JSON.parse(s); } catch(e){}
  return { progress:{} };
}
function saveState(){ try { localStorage.setItem('toan9-progress', JSON.stringify(state)); } catch(e){} }
function getProgress(chId,lId){ return state.progress[chId+'-'+lId] || { theorySteps:0, practice:0, game:0, quiz:0 }; }
function setProgress(chId,lId,upd){
  const k = chId+'-'+lId;
  state.progress[k] = Object.assign({}, getProgress(chId,lId), upd);
  saveState();
  try {
    let act = JSON.parse(localStorage.getItem('toan9-activity') || '[]');
    const today = new Date().toISOString().slice(0,10);
    if(!act.includes(today)){ act.push(today); act = act.sort().slice(-365); localStorage.setItem('toan9-activity', JSON.stringify(act)); }
  } catch(e){}
}
function isLessonDone(chId,lId){
  const p = getProgress(chId,lId);
  const lc = LESSON_CONTENT[chId+'-'+lId];
  if(!lc) return false;
  return p.theorySteps >= lc.steps.length && p.practice >= 80 && p.quiz >= 80;
}
function isLessonUnlocked(chId,lId){
  // Free navigation: any built lesson clickable at any time.
  // (Within-lesson mastery model still gates step→step inside a lesson.)
  return true;
}
function isLessonBuilt(chId,lId){
  const ch = CURRICULUM.find(c=>c.id===chId);
  if(!ch) return false;
  const l = ch.lessons.find(x=>x.id===lId);
  return !!(l && l.built);
}

function calcOverall(){
  let t=0,c=0;
  CURRICULUM.forEach(ch=>ch.lessons.forEach(l=>{ if(l.built){ c++; if(isLessonDone(ch.id,l.id)) t++; } }));
  return c>0 ? Math.round(t/c*100) : 0;
}
function getCurrentAttempt(item){
  // Backward compat: support both old single attempt and new attempts array
  if(item.attempts && Array.isArray(item.attempts)){
    if(!lessonView.attempt) lessonView.attempt = { tries:0, passed:false, state:'idle', lastInput:'', revealed:false, history:[], currentVar:0, streak:0 };
    if(typeof lessonView.attempt.currentVar !== 'number') lessonView.attempt.currentVar = 0;
    return item.attempts[lessonView.attempt.currentVar % item.attempts.length];
  }
  return item.attempt;
}
function getMasteryTotal(item){
  return item.attempts ? item.attempts.length : 1;
}
function getMasteryRequired(){ return 3; } // 3 correct in a row to advance

function getCurrentDpItem(){
  const lc = LESSON_CONTENT[view.chId+'-'+view.lId];
  if(lessonView.tab === 'theory') return lc.steps[lessonView.step];
  if(lessonView.tab === 'practice') return lc.practice[lessonView.practiceIdx];
  return null;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderHeader() + renderMain();
  document.querySelectorAll('[data-graph]').forEach(el=>{ el.innerHTML = renderGraph(1, 1, 6, 'x + y = 6', 8); });
  attachEvents();
  attachTooltipTaps();
}
function renderHeader(){
  const o = calcOverall();
  return '<div class="header"><h1>📚 Toán 9 — Hành trình chinh phục</h1><div class="sub">Sách Kết nối tri thức với cuộc sống · Tập 1</div><div class="greet">Chào Mika! 🧮</div><div class="lang-tip">💡 <strong>Hint for Mika:</strong> Tap or hover any underlined Vietnamese word to see the English meaning.</div><div class="pbar"><div class="pbar-fill" style="width:'+o+'%"></div></div><div class="ptext">Tổng tiến độ: '+o+'% hoàn thành</div></div>';
}
function renderMain(){
  if(view.type==='hub') return renderHub();
  if(view.type==='chapter') return renderChapter(view.chId);
  if(view.type==='lesson') return renderLesson(view.chId, view.lId);
  return '';
}
function renderHub(){
  let h = '<div class="crumb"><span>Trang chủ</span></div>';
  CURRICULUM.forEach(ch=>{
    const built = ch.lessons.filter(l=>l.built).length;
    const done = ch.lessons.filter(l=>isLessonDone(ch.id,l.id)).length;
    const tot = built > 0 ? built : ch.lessons.length;
    const pct = tot>0 ? Math.round(done/tot*100) : 0;
    const u = isLessonUnlocked(ch.id, ch.lessons[0].id);
    h += '<div class="card '+(u?'click':'locked')+' '+(pct===100&&built>0?'done':'')+'" data-act="open-ch" data-ch="'+ch.id+'"><div class="tag">'+ch.num+''+'</div><div class="title">'+highlight(ch.title)+'</div><div class="desc">'+ch.desc+'</div><div class="row"><div class="mp"><div class="mpf" style="width:'+pct+'%"></div></div><span>'+done+'/'+tot+'</span></div></div>';
  });
  return h;
}
function renderChapter(chId){
  const ch = CURRICULUM.find(c=>c.id===chId);
  let h = '<div class="crumb"><a data-act="hub">Trang chủ</a><span class="sep">›</span><span>'+ch.num+'</span></div><div class="card"><div class="tag">'+ch.num+'</div><div class="title">'+highlight(ch.title)+'</div><div class="desc">'+ch.desc+'</div></div>';
  ch.lessons.forEach(l=>{
    const u = isLessonUnlocked(chId, l.id);
    const d = isLessonDone(chId, l.id);
    const tagColor = !l.built ? 'gray' : '';
    const tagSuffix = !l.built ? ' • Sắp ra mắt' : '';
    h += '<div class="card '+(((!u||!l.built))?'locked':'click')+' '+(d?'done':'')+'" data-act="open-l" data-ch="'+chId+'" data-l="'+l.id+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1;min-width:0"><div class="tag '+tagColor+'">'+l.num+tagSuffix+'</div><div class="title" style="font-size:14px">'+highlight(l.title)+'</div><div class="desc">'+l.desc+'</div></div>'+(d?'<span class="badge">✓ Đạt</span>':'')+'</div></div>';
  });
  return h;
}
function renderLesson(chId,lId){
  const ch = CURRICULUM.find(c=>c.id===chId);
  const l = ch.lessons.find(x=>x.id===lId);
  const lc = LESSON_CONTENT[chId+'-'+lId];
  const p = getProgress(chId,lId);
  const tabs = [
    { id:'theory', icon:'📖', label:'Lý thuyết', unlocked:true, done:p.theorySteps>=lc.steps.length },
    { id:'practice', icon:'✏️', label:'Luyện tập', unlocked:p.theorySteps>=lc.steps.length, done:p.practice>=80 },
    { id:'game', icon:'🎮', label:'Trò chơi', unlocked:p.practice>=80, done:p.game>=70 },
    { id:'quiz', icon:'🏆', label:'Kiểm tra', unlocked:p.practice>=80, done:p.quiz>=80 }
  ];
  let h = '<div class="crumb"><a data-act="hub">Trang chủ</a><span class="sep">›</span><a data-act="open-ch" data-ch="'+chId+'">'+ch.num+'</a><span class="sep">›</span><span>'+l.num+'</span></div>';
  h += '<div class="card"><div class="tag">'+l.num+'</div><div class="title" style="font-size:15px">'+highlight(l.title)+'</div></div>';
  h += '<div class="tabs">';
  tabs.forEach(t=>{
    const cls = (lessonView.tab===t.id?'act':'') + (!t.unlocked?' lock':'');
    h += '<button class="tab '+cls+'" data-act="tab" data-tab="'+t.id+'" '+(!t.unlocked?'disabled':'')+'><span class="ic">'+t.icon+'</span>'+t.label+(t.done?' ✓':'')+'</button>';
  });
  h += '</div>';
  if(lessonView.tab==='theory') h += renderTheory(chId,lId);
  else if(lessonView.tab==='practice') h += renderPractice(chId,lId);
  else if(lessonView.tab==='game') h += renderGame(chId,lId);
  else if(lessonView.tab==='quiz') h += renderQuiz(chId,lId);
  return h;
}
function renderTheory(chId,lId){
  const lc = LESSON_CONTENT[chId+'-'+lId];
  if(lessonView.step === -1){
    const s = lc.story;
    const storyText = stripHtml(s.problem)+'. Trước khi học: '+stripHtml(s.before.body)+'. Sau khi học: '+stripHtml(s.after.body)+'. '+stripHtml(s.why);
    return '<div class="theory"><h3><span>📖 Câu chuyện mở đầu</span><button class="spk-btn" data-spk-text="'+encodeURIComponent(storyText)+'">🔊</button></h3><div class="story"><div class="story-title">🍊 Bài toán cổ (theo SGK)</div>'+highlight(s.problem)+'</div><div class="compare"><div class="before"><h4>'+s.before.title+'</h4>'+highlight(s.before.body)+'</div><div class="after"><h4>'+s.after.title+'</h4>'+highlight(s.after.body)+'</div></div><div class="why"><strong>Vì sao học bài này?</strong> '+highlight(s.why)+'</div><div class="center" style="margin-top:14px"><button class="btn" data-act="theory-start">Bắt đầu học từng bước nhỏ →</button></div></div>';
  }
  if(lessonView.step >= lc.steps.length){
    return '<div class="theory"><h3>🎉 Hoàn thành lý thuyết!</h3><p>Mika đã học xong tất cả '+lc.steps.length+' bước. Qua phần Luyện tập nhé!</p><div class="center" style="margin-top:12px"><button class="btn ok" data-act="goto-practice">Qua Luyện tập →</button></div></div>';
  }
  const step = lc.steps[lessonView.step];
  const total = lc.steps.length;
  const cur = lessonView.step;
  const p = getProgress(chId,lId);
  let dots = '';
  for(let i=0;i<total;i++){
    const cls = i===cur?'act':(i<p.theorySteps?'done':'');
    dots += '<span class="dot '+cls+'"></span>';
  }
  const fullText = step.title+'. Vì sao: '+stripHtml(step.why)+'. So sánh: '+stripHtml(step.analogy)+'. '+stripHtml(step.body);
  let h = '<div class="theory"><h3><span>Bước '+(cur+1)+'/'+total+': '+highlight(step.title)+'</span><button class="spk-btn" data-spk-text="'+encodeURIComponent(fullText)+'">🔊</button></h3>';
  h += '<div class="why"><strong>Vì sao cần?</strong> '+highlight(step.why)+'</div>';
  h += '<div class="analogy"><strong>Phép so sánh:</strong> '+highlight(step.analogy)+'</div>';
  h += '<div class="body-text">'+highlight(step.body)+'</div>';
  if(step.examples && step.examples.length){
    h += '<details class="examples"><summary>📚 Xem thêm ví dụ ('+step.examples.length+')</summary><div class="ex-list">';
    step.examples.forEach(ex=>{ h += '<div class="ex-item"><div class="ex-q">❓ '+highlight(ex.q)+'</div><div class="ex-a">→ '+highlight(ex.a)+'</div></div>'; });
    h += '</div></details>';
  }
  h += renderDeepPractice(step, 'theory');
  h += '<div class="step-nav"><button class="btn sec" data-act="step-prev">← Trước</button><div class="step-dots">'+dots+'</div><button class="btn" data-act="step-next" id="next-btn" '+(lessonView.attempt && lessonView.attempt.passed ? '' : 'disabled')+'>Sau →</button></div>';
  h += '</div>';
  return h;
}
function renderDeepPractice(item, ctx){
  if(!lessonView.attempt) lessonView.attempt = { tries:0, passed:false, state:'idle', lastInput:'', revealed:false, history:[] };
  const a = lessonView.attempt;
  const bp = item.blueprint;
  const at = getCurrentAttempt(item);
  let h = '';
  if(bp){
    h += '<div class="blueprint"><div class="bp-tag">BƯỚC 1 · QUAN SÁT</div><h4>👀 Xem chuyên gia làm</h4><div class="bp-prob"><b>Bài:</b> '+highlight(bp.problem)+'</div><div class="bp-sol">'+highlight(bp.solution)+'</div></div>';
  }
  h += '<div class="attempt"><div class="at-tag">BƯỚC 2 · LƯỢT EM</div><h4>✏️ Em hãy thử</h4>'+
    (item.attempts ? (function(){
      const need = getMasteryRequired();
      const streak = (a.streak || 0);
      let dots = '';
      for(let k=0;k<need;k++){ dots += '<span class="m-dot ' + (k<streak?'on':'') + '"></span>'; }
      const total = getMasteryTotal(item);
      const varN = (a.currentVar || 0) % total + 1;
      return '<div class="mastery-row"><span class="m-label">Mastery: ' + dots + '</span><span class="m-progress">' + streak + '/' + need + ' đúng liên tiếp · biến thể ' + varN + '/' + total + '</span></div>';
    })() : '')+'<div class="at-prompt">'+highlight(at.prompt)+'</div>';
  if(at.type === 'yesno'){
    const ynShowFb = (a.state==='wrong' || a.state==='correct' || a.state==='correct-streaking');
    const yesCls = ynShowFb ? (at.correct==='yes' ? 'ok' : (a.lastPicked==='yes' ? 'no' : '')) : '';
    const noCls = ynShowFb ? (at.correct==='no' ? 'ok' : (a.lastPicked==='no' ? 'no' : '')) : '';
    const ynDis = (a.passed || a.state==='pause' || ynShowFb) ? 'disabled' : '';
    h += '<div class="yesno"><button data-act="dp-yesno" data-v="yes" class="'+yesCls+'" '+ynDis+'>✓ Có</button><button data-act="dp-yesno" data-v="no" class="'+noCls+'" '+ynDis+'>✗ Không</button></div>';
  } else {
    h += '<input type="text" class="at-input" id="dp-input" placeholder="'+(at.placeholder||'')+'" value="'+(a.lastInput||'').replace(/"/g,'&quot;')+'" '+(a.passed||a.state==='pause'?'disabled':'')+' autocomplete="off">';
    h += '<div class="attempt-actions"><button class="btn" data-act="dp-submit" '+(a.passed||a.state==='pause'?'disabled':'')+'>Kiểm tra</button>'+(a.tries>0 && !a.passed?'<button class="btn sec" data-act="dp-reset">↻ Bắt đầu lại</button>':'')+'</div>';
  }
  if(a.history.length > 0){
    h += '<div class="attempts-trail"><span>Lượt:</span>';
    a.history.forEach((r,i)=>{ h += '<span class="at-dot '+(r?'ok':'no')+'">'+(i+1)+'</span>'; });
    h += '</div>';
  }
  if(a.state === 'wrong' && a.lastMsg){
    h += '<div class="stop-fix"><div class="sf-title">🛑 Dừng lại — kiểm tra lỗi</div><div class="sf-body">'+highlight(a.lastMsg)+'</div></div>';
  }
  if(a.state === 'pause'){
    h += '<div class="replay"><div class="rp-title">🧘 Đọc thầm trong đầu...</div><div class="rp-count" id="rp-count">'+a.pauseLeft+'</div><div class="rp-text">Đọc lại bài giải mẫu, nhẩm các bước, rồi thử lại.</div></div>';
  }
  if(a.state === 'correct-streaking'){
    h += '<div class="success-card streaking"><div class="sc-title">✅ Đúng — sang biến thể tiếp...</div><div class="sc-body">Mastery: '+(a.streak||0)+'/'+getMasteryRequired()+' đúng liên tiếp.</div></div>';
  }
  if(a.state === 'correct' && a.passed){
    h += '<div class="success-card"><div class="sc-title">🎯 Đúng rồi!</div><div class="sc-body">'+highlight(at.explanation)+'</div>';
    if(ctx === 'practice'){
      h += '<div style="margin-top:10px"><button class="btn ok" data-act="practice-next">Câu tiếp →</button></div>';
    }
    h += '</div>';
  }
  if(a.revealed && !a.passed){
    h += '<div class="success-card" style="background:linear-gradient(135deg,#fff7ed,#fef3c7);border-color:#fcd34d;"><div class="sc-title" style="color:#92400e">📖 Đáp án</div><div class="sc-body" style="color:#78350f">'+highlight(at.explanation)+'<br><br>Hãy đọc kỹ rồi tiếp tục.</div>';
    if(ctx === 'practice'){
      h += '<div style="margin-top:10px"><button class="btn warn" data-act="practice-next">Câu tiếp →</button></div>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}
function renderPractice(chId,lId){
  const lc = LESSON_CONTENT[chId+'-'+lId];
  const total = lc.practice.length;
  if(lessonView.practiceIdx >= total){
    const correct = (lessonView.practiceCorrect || 0);
    const pct = Math.round(correct/total*100);
    setProgress(chId,lId,{ practice: Math.max(getProgress(chId,lId).practice, pct) });
    const win = pct >= 80;
    return '<div class="score-banner '+(win?'win':'lose')+'"><div class="big">'+correct+'/'+total+'</div><div class="lbl">Số câu giải được trong 3 lượt ('+pct+'%)</div><div style="margin-top:10px;font-size:13px">'+(win?'🎉 Tuyệt vời, Mika!':'💪 Cần ≥80% (4/5 câu) để mở Trò chơi.')+'</div><div style="margin-top:11px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn sec" data-act="practice-restart">Làm lại</button>'+(win?'<button class="btn ok" data-act="goto-game">Sang Trò chơi →</button>':'')+'</div></div>';
  }
  const item = lc.practice[lessonView.practiceIdx];
  let sgkHeader = '';
  if(item.sgk && (lessonView.practiceIdx===0 || !lc.practice[lessonView.practiceIdx-1].sgk)){
    sgkHeader = '<div class="sgk-section-header"><span class="sgk-icon">📘</span> Bài tập từ Sách giáo khoa <span class="sgk-page">trang '+item.page+'</span></div>';
  }
  let h = sgkHeader + '<div class="problem' + (item.sgk?' problem-sgk':'') + '"><div class="tiny">Câu '+(lessonView.practiceIdx+1)+'/'+total+'</div></div>';
  h += renderDeepPractice(item, 'practice');
  return h;
}
function renderGame(chId,lId){
  const lc = LESSON_CONTENT[chId+'-'+lId];
  const game = lc.game;
  if(!lessonView.gameState){ lessonView.gameState = { round:0, picked:[], finishedRounds:[], streak:0, bonus:0, lastWrong:null }; }
  const gs = lessonView.gameState;
  if(gs.round >= game.rounds.length){
    const total = gs.finishedRounds.reduce((a,b)=>a+b.score,0) + gs.bonus;
    const max = gs.finishedRounds.reduce((a,b)=>a+b.max,0);
    const pct = max>0 ? Math.round(total/max*100) : 0;
    setProgress(chId,lId,{ game: Math.max(getProgress(chId,lId).game, pct) });
    const win = pct >= 70;
    return '<div class="score-banner '+(win?'win':'lose')+'"><div class="big">'+total+'/'+max+'</div><div class="lbl">Điểm trò chơi ('+pct+'%) • Bonus: +'+gs.bonus+'</div><div style="margin-top:10px;font-size:13px">'+(win?'🎮 Mika quá giỏi!':'🎯 Chơi lại nhé!')+'</div><div style="margin-top:11px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn sec" data-act="game-restart">Chơi lại</button>'+(win?'<button class="btn ok" data-act="goto-quiz">Sang Kiểm tra →</button>':'')+'</div></div>';
  }
  const r = game.rounds[gs.round];
  const curScore = gs.finishedRounds.reduce((a,b)=>a+b.score,0)+gs.bonus;
  let h = '<div class="game"><h4>🎮 '+game.title+'</h4><div class="tiny">Vòng '+(gs.round+1)+'/'+game.rounds.length+' — '+game.desc+'</div>'+
    '<div class="game-stats"><div><span class="lbl">Điểm</span><span class="v">'+curScore+'</span></div><div class="'+(gs.streak>=2?'streak-on':'')+'"><span class="lbl">🔥 Streak</span><span class="v">'+gs.streak+'</span></div><div><span class="lbl">Bonus</span><span class="v">+'+gs.bonus+'</span></div></div>'+
    '<div class="game-eq">'+r.eq+'</div>';
  if(gs.lastWrong){
    h += '<div class="pitfall"><span class="pf-tag">SAI</span>'+gs.lastWrong+'</div>';
  }
  h += '<div class="tiny center">Streak ≥ 3 → bonus mỗi cú đúng!</div><div class="points-grid">';
  r.points.forEach((p,i)=>{
    const isSol = (r.a*p[0] + r.b*p[1]) === r.c;
    let cls = '';
    if(gs.picked.includes(i)){ cls = isSol ? 'picked-ok' : 'picked-no'; }
    h += '<button class="pt-btn '+cls+'" data-act="game-pick" data-i="'+i+'" '+(gs.picked.includes(i)?'disabled':'')+'>('+p[0]+'; '+p[1]+')</button>';
  });
  h += '</div><div class="center" style="margin-top:8px"><button class="btn" data-act="game-done">Xong vòng này →</button></div></div>';
  return h;
}
function renderQuiz(chId,lId){
  const lc = LESSON_CONTENT[chId+'-'+lId];
  const total = lc.quiz.length;
  if(lessonView.quizIdx >= total){
    const correct = lessonView.quizAnswers.filter((a,i)=>a===lc.quiz[i].ans).length;
    const pct = Math.round(correct/total*100);
    setProgress(chId,lId,{ quiz: Math.max(getProgress(chId,lId).quiz, pct) });
    const win = pct >= 80;
    if(win) celebrate();
    let nextBtn = '';
    if(win){
      const ch = CURRICULUM.find(c=>c.id===chId);
      const idx = ch.lessons.findIndex(x=>x.id===lId);
      if(idx+1 < ch.lessons.length){ nextBtn = '<button class="btn ok" data-act="open-l" data-ch="'+chId+'" data-l="'+ch.lessons[idx+1].id+'">Bài tiếp →</button>'; }
    }
    return '<div class="score-banner '+(win?'win':'lose')+'"><div class="big">'+correct+'/'+total+'</div><div class="lbl">Điểm KT ('+pct+'%)</div><div style="margin-top:10px;font-size:13px">'+(win?'🏆 Mika đã ĐẠT!':'📚 Cần ≥80%, Mika ơi.')+'</div><div style="margin-top:11px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn sec" data-act="quiz-restart">Làm lại</button>'+(!win?'<button class="btn warn" data-act="goto-theory">Ôn lại</button>':'')+nextBtn+'</div></div>';
  }
  const q = lc.quiz[lessonView.quizIdx];
  let h = '<div class="problem"><div class="tiny">Câu '+(lessonView.quizIdx+1)+'/'+total+' • Cần 80%</div><div class="problem-q" style="margin-top:5px">'+highlight(q.q)+'</div><div class="opts">';
  q.opts.forEach((o,i)=>{ h += '<button class="opt" data-act="quiz-ans" data-i="'+i+'">'+highlight(o)+'</button>'; });
  h += '</div></div>';
  return h;
}

function attachEvents(){
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      handleAction(el.dataset.act, el);
    });
  });
  document.querySelectorAll('[data-spk-text]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      speak(el, decodeURIComponent(el.dataset.spkText));
    });
  });
  const inp = document.getElementById('dp-input');
  if(inp && !inp.disabled) inp.focus();
  if(inp){
    inp.addEventListener('keydown', e=>{
      if(e.key === 'Enter'){ e.preventDefault(); handleDeepSubmit(inp.value); }
    });
  }
}
function handleAction(act, el){
  switch(act){
    case 'hub': view = {type:'hub'}; resetLessonView(); render(); break;
    case 'open-ch': view = {type:'chapter', chId:el.dataset.ch}; resetLessonView(); render(); break;
    case 'open-l': {
      const chId = el.dataset.ch, lId = el.dataset.l;
      const ch = CURRICULUM.find(c=>c.id===chId);
      const l = ch.lessons.find(x=>x.id===lId);
      if(!isLessonBuilt(chId,lId)){ showToast('🛠️ Bài này đang được xây dựng. Sắp ra mắt!'); return; }
      if(!l.built){ showToast('🚧 Bài này đang phát triển.'); return; }
      view = {type:'lesson', chId:chId, lId:lId};
      resetLessonView();
      const p = getProgress(chId,lId);
      lessonView.step = p.theorySteps > 0 ? p.theorySteps : -1;
      const lc = LESSON_CONTENT[chId+'-'+lId];
      if(lessonView.step >= lc.steps.length) lessonView.step = lc.steps.length - 1;
      render(); break;
    }
    case 'tab': lessonView.tab = el.dataset.tab; lessonView.practiceIdx=0; lessonView.practiceCorrect=0; lessonView.quizIdx=0; lessonView.quizAnswers=[]; lessonView.gameState=null; lessonView.attempt=null; render(); break;
    case 'theory-start': lessonView.step = 0; lessonView.attempt = null; render(); break;
    case 'step-prev':
      stopReplay();
      if(lessonView.step > 0){ lessonView.step--; lessonView.attempt = null; render(); }
      else if(lessonView.step === 0){ lessonView.step = -1; lessonView.attempt = null; render(); }
      break;
    case 'step-next': {
      stopReplay();
      lessonView.step++;
      lessonView.attempt = null;
      const p = getProgress(view.chId,view.lId);
      setProgress(view.chId,view.lId,{ theorySteps: Math.max(p.theorySteps, lessonView.step) });
      render(); break;
    }
    case 'dp-submit': {
      const inp = document.getElementById('dp-input');
      handleDeepSubmit(inp ? inp.value : ''); break;
    }
    case 'dp-yesno': handleDeepSubmit(el.dataset.v); break;
    case 'dp-reset': lessonView.attempt = null; render(); break;
    case 'practice-next': {
      if(lessonView.attempt && lessonView.attempt.passed && !lessonView.attempt.revealed){
        lessonView.practiceCorrect = (lessonView.practiceCorrect||0) + 1;
      }
      lessonView.practiceIdx++;
      lessonView.attempt = null;
      stopReplay();
      render(); break;
    }
    case 'practice-restart': lessonView.practiceIdx=0; lessonView.practiceCorrect=0; lessonView.attempt=null; render(); break;
    case 'quiz-ans': handleQuizAnswer(parseInt(el.dataset.i)); break;
    case 'quiz-restart': lessonView.quizIdx=0; lessonView.quizAnswers=[]; render(); break;
    case 'game-pick': handleGamePick(parseInt(el.dataset.i)); break;
    case 'game-done': handleGameRoundDone(); break;
    case 'game-restart': lessonView.gameState = null; render(); break;
    case 'goto-practice': lessonView.tab='practice'; lessonView.practiceIdx=0; lessonView.practiceCorrect=0; lessonView.attempt=null; render(); break;
    case 'goto-game': lessonView.tab='game'; lessonView.gameState=null; render(); break;
    case 'goto-quiz': lessonView.tab='quiz'; lessonView.quizIdx=0; lessonView.quizAnswers=[]; render(); break;
    case 'goto-theory': lessonView.tab='theory'; lessonView.step=-1; lessonView.attempt=null; render(); break;
  }
}
function handleDeepSubmit(input){
  const item = getCurrentDpItem();
  if(!item) return;
  const at = getCurrentAttempt(item);
  if(!at) return;
  if(!lessonView.attempt) lessonView.attempt = { tries:0, passed:false, state:'idle', lastInput:'', revealed:false, history:[], currentVar:0, streak:0 };
  const a = lessonView.attempt;
  if(typeof a.currentVar !== 'number') a.currentVar = 0;
  if(typeof a.streak !== 'number') a.streak = 0;
  if(a.passed || a.state === 'pause') return;
  a.lastInput = input;
  a.lastPicked = input;
  const result = validateAttempt(at, input);
  a.tries++;
  a.history.push(result.ok);
  if(item.attempts && Array.isArray(item.attempts)){
    if(result.ok){
      a.streak++;
      if(a.streak >= getMasteryRequired()){
        a.passed = true;
        a.state = 'correct';
      } else {
        a.state = 'correct-streaking';
        // After 1.8s, advance to next variation and reset visual feedback
        setTimeout(()=>{
          if(lessonView.attempt && lessonView.attempt.state === 'correct-streaking'){
            lessonView.attempt.currentVar = (lessonView.attempt.currentVar || 0) + 1;
            lessonView.attempt.state = 'idle';
            lessonView.attempt.lastInput = '';
            lessonView.attempt.lastPicked = undefined;
            render();
          }
        }, 1800);
      }
    } else {
      a.state = 'wrong';
      a.streak = 0;
      a.lastMsg = result.msg || '<b>Chưa đúng.</b> Đọc lại bài, nhẩm trong đầu, rồi thử lại.';
      if(a.tries >= 8){
        a.revealed = true;
        a.passed = true;
        a.state = 'correct';
      }
    }
  } else {
    if(result.ok){ a.passed = true; a.state = 'correct'; }
    else {
      a.state = 'wrong';
      a.lastMsg = result.msg || '<b>Chưa đúng.</b>';
      if(a.tries >= 3){ a.revealed = true; a.passed = true; a.state = 'correct'; }
    }
  }
  render();
  if(!a.passed && !a.revealed && a.state === 'wrong'){ setTimeout(()=>startReplay(), 500); }
}
function startReplay(){
  const a = lessonView.attempt;
  if(!a) return;
  a.state = 'pause';
  a.pauseLeft = 5;
  render();
  replayTimer = setInterval(()=>{
    a.pauseLeft--;
    const el = document.getElementById('rp-count');
    if(el) el.textContent = a.pauseLeft;
    if(a.pauseLeft <= 0){
      clearInterval(replayTimer); replayTimer = null;
      a.state = 'idle';
      a.lastInput = '';
      // After pause from a wrong answer, advance to next variation (if mastery model)
      const item = getCurrentDpItem();
      if(item && item.attempts){
        a.currentVar = (a.currentVar + 1) % item.attempts.length;
      }
      render();
    }
  }, 1000);
}
function stopReplay(){ if(replayTimer){ clearInterval(replayTimer); replayTimer = null; } }
function resetLessonView(){
  stopReplay();
  lessonView = { tab:'theory', step:-1, attempt:null, practiceIdx:0, practiceCorrect:0, quizIdx:0, quizAnswers:[], gameState:null };
}
function handleQuizAnswer(i){
  const lc = LESSON_CONTENT[view.chId+'-'+view.lId];
  const q = lc.quiz[lessonView.quizIdx];
  lessonView.quizAnswers.push(i);
  const opts = document.querySelectorAll('.problem .opt');
  opts.forEach((o,idx)=>{
    o.disabled = true;
    if(idx === q.ans) o.classList.add('ok');
    else if(idx === i) o.classList.add('no');
  });
  setTimeout(()=>{ lessonView.quizIdx++; render(); }, 900);
}
function handleGamePick(i){
  const gs = lessonView.gameState;
  if(gs.picked.includes(i)) return;
  const lc = LESSON_CONTENT[view.chId+'-'+view.lId];
  const r = lc.game.rounds[gs.round];
  const p = r.points[i];
  const lhs = r.a*p[0] + r.b*p[1];
  const isSol = lhs === r.c;
  gs.picked.push(i);
  if(isSol){
    gs.streak = (gs.streak||0) + 1;
    if(gs.streak >= 3) gs.bonus = (gs.bonus||0) + 1;
    gs.lastWrong = null;
  } else {
    gs.streak = 0;
    let hint = '<b>('+p[0]+'; '+p[1]+'):</b> Thay vào: '+r.a+'·('+p[0]+') + '+r.b+'·('+p[1]+') = '+lhs+'. Phải bằng <b>'+r.c+'</b>, nhưng được '+lhs+' → KHÔNG phải nghiệm.';
    const diff = lhs - r.c;
    if(Math.abs(diff) <= Math.abs(r.a) && r.a !== 0){
      hint += '<br>📍 <i>Có thể em quên hệ số '+r.a+' trước x.</i>';
    } else if(Math.abs(diff) <= Math.abs(r.b) && r.b !== 0){
      hint += '<br>📍 <i>Có thể em quên hệ số '+r.b+' trước y.</i>';
    } else if(r.b < 0 && p[1] > 0){
      hint += '<br>📍 <i>Cẩn thận với dấu trừ trước y!</i>';
    }
    gs.lastWrong = hint;
  }
  render();
}
function handleGameRoundDone(){
  const lc = LESSON_CONTENT[view.chId+'-'+view.lId];
  const r = lc.game.rounds[lessonView.gameState.round];
  let score = 0, max = 0;
  r.points.forEach((p,i)=>{
    const isSol = (r.a*p[0] + r.b*p[1]) === r.c;
    if(isSol) max++;
    if(lessonView.gameState.picked.includes(i)){
      if(isSol) score++; else score--;
    }
  });
  if(score < 0) score = 0;
  lessonView.gameState.finishedRounds.push({score:score, max:max});
  lessonView.gameState.round++;
  lessonView.gameState.picked = [];
  lessonView.gameState.lastWrong = null;
  render();
}
function attachTooltipTaps(){
  document.querySelectorAll('.tip').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      document.querySelectorAll('.tip.act').forEach(t=>{ if(t!==el) t.classList.remove('act'); });
      el.classList.toggle('act');
    });
  });
  document.addEventListener('click', ()=>{
    document.querySelectorAll('.tip.act').forEach(t=>t.classList.remove('act'));
  });
}
function showToast(msg){
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:1000;max-width:90%;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.25)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}
function celebrate(){
  const colors = ['#6b46c1','#10b981','#f59e0b','#ef4444','#0ea5e9','#f43f5e'];
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.style.cssText = 'position:fixed;width:8px;height:8px;background:'+colors[i%colors.length]+';top:-10px;left:'+(Math.random()*100)+'%;z-index:1000;border-radius:2px;pointer-events:none';
    document.body.appendChild(c);
    const dur = 1500 + Math.random()*1500;
    c.animate([{transform:'translateY(0) rotate(0)',opacity:1},{transform:'translateY('+(window.innerHeight+20)+'px) rotate(1080deg)',opacity:.6}], {duration:dur,easing:'ease-in'});
    setTimeout(()=>c.remove(), dur);
  }
}

render();
</script>
